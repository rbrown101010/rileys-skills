interface:
  display_name: "Sprite Animation"
  short_description: "Turn reference images into Codex-compatible animated spritesheets"
  default_prompt: "Create a Codex-compatible animated sprite character from a concept, reference images, or both. Infer missing names/descriptions, use $imagegen for the base and grounded row strips, generate running-right before deciding whether running-left can be safely mirrored, then use this skill's deterministic scripts to ingest outputs, validate frames, assemble the spritesheet, and package the result under ${CODEX_HOME:-$HOME/.codex}/pets/<sprite-name>/ with pet.json and spritesheet.webp."
